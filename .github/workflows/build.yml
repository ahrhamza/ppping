name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Vet
        run: go vet ./...

      - name: Build Windows amd64
        run: GOOS=windows GOARCH=amd64 go build -o ppping.exe .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ppping-windows-amd64
          path: ppping.exe
